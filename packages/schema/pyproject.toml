[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maya-schema"
version = "0.1.0"
description = "Shared schema and utilities for Maya voice agent"
requires-python = ">=3.11"
dependencies = ["jsonpatch>=1.33"]

[tool.setuptools.packages.find]
where = ["."]
include = ["maya_schema*"]
